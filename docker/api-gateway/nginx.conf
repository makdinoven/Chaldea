worker_processes 1;

events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    keepalive_timeout  65;
    keepalive_requests 500;

    upstream user-service_backend {
        server user-service:8000;
    }

    upstream frontend_dev_server {
        server frontend:5173;  # Прокси запросов к Vite серверу разработки
    }

    server {
        listen 80;
        server_name localhost;

        # Прокси запросов API к backend
        location /api/ {
            proxy_pass http://user-service_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Прокси запросов к Vite серверу разработки
        location / {
            proxy_pass http://frontend_dev_server;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_buffering off;  # Отключить буферизацию для обеспечения мгновенного ответа сервера разработки
        }
    }
}
