worker_processes 1;

events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    keepalive_timeout  65;
    keepalive_requests 500;

    upstream user-service_backend {
        server user-service:8000;
    }
    upstream character-attributes-service_backend{
        server character-attributes-service:8002;
    }

    upstream skills-service_backendcxc{
        server skills-service:8099;
    }

    upstream skills-service_backend{
        server skills-service:8003;
    }

    upstream inventory-service_backend{
        server inventory-service:8004;
    }
    upstream character-service_backend{
        server character-service:8005;
    }
    upstream locations-service_backend{
        server locations-service:8006;
    }

    upstream photo-service_backend{
        server photo-service:8001;
    }

    upstream frontend_dev_server {
        server frontend:5173;  # Прокси запросов к Vite серверу разработки
    }

    server {
        listen 80;
        server_name localhost;

        # Прокси запросов API к backend
        location /api/ {
            proxy_pass http://user-service_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /users/ {
            proxy_pass http://user-service_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;


        }

        location /characters/ {
            proxy_pass http://character-service_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;


        }

        location /attributes/ {
            proxy_pass http://character-attributes-service_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;


        }

        location /skills/ {
            proxy_pass http://skills-service_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

        }

        location /inventory/ {
            proxy_pass http://inventory-service_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

        }

        location /photo/ {
        proxy_pass http://photo-service_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;


        }

        location /locations/ {
        proxy_pass http://locations-service_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /media/ {
        alias /var/www/photo-service/media/;
        try_files $uri $uri/ =404;
        autoindex off;

        }

        # Прокси запросов к Vite серверу разработки
        location / {
    proxy_pass http://frontend_dev_server;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_buffering off;

    # Принудительно добавляем заголовки для всех ответов
    add_header Access-Control-Allow-Origin * always;
    add_header Access-Control-Allow-Methods "GET, POST, OPTIONS" always;
    add_header Access-Control-Allow-Headers "Origin, Content-Type, Authorization" always;

    # Обработка preflight-запросов
    if ($request_method = 'OPTIONS') {
        add_header Access-Control-Allow-Origin * always;
        add_header Access-Control-Allow-Methods "GET, POST, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Origin, Content-Type, Authorization" always;
        return 204;
    }
 }
}
}
