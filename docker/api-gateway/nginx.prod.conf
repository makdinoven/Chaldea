worker_processes 1;

events {
    worker_connections 1024;
}
http {
    include       mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    keepalive_timeout  65;
    keepalive_requests 500;

    client_max_body_size 16m;

    upstream user-service_backend {
        server user-service:8000;
    }
    upstream character-attributes-service_backend{
        server character-attributes-service:8002;
    }

    upstream skills-service_backend{
        server skills-service:8003;
    }

    upstream inventory-service_backend{
        server inventory-service:8004;
    }
    upstream character-service_backend{
        server character-service:8005;
    }
    upstream locations-service_backend{
        server locations-service:8006;
    }

    upstream photo-service_backend{
        server photo-service:8001;
    }

    upstream notification-service_backend{
        server notification-service:8007;
    }

    upstream battle-service_backend {
        server battle-service:8010;
    }

    upstream autobattle-service_backend {
        server autobattle-service:8011;
    }

    # HTTP — ACME challenge + redirect to HTTPS
    server {
        listen 80;
        server_name fallofgods.top;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # HTTPS — main server
    server {
        listen 443 ssl;
        server_name fallofgods.top;

        ssl_certificate     /etc/letsencrypt/live/fallofgods.top/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/fallofgods.top/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;

        # Security headers
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "SAMEORIGIN" always;

        # API proxy locations
        location /api/ {
            proxy_pass http://user-service_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /users/ {
            proxy_pass http://user-service_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /characters/ {
            proxy_pass http://character-service_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /attributes/ {
            proxy_pass http://character-attributes-service_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /skills/ {
            proxy_pass http://skills-service_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /inventory/ {
            proxy_pass http://inventory-service_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /photo/ {
            client_max_body_size 16m;
            proxy_pass http://photo-service_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /locations/ {
            proxy_pass http://locations-service_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /rules/ {
            proxy_pass http://locations-service_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /notifications/ {
            proxy_pass http://notification-service_backend;
            proxy_http_version 1.1;
            proxy_set_header Connection '';
            proxy_buffering off;
            chunked_transfer_encoding off;
            proxy_read_timeout 3600;
        }

        location /battles/ {
            proxy_pass http://battle-service_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /autobattle/ {
            rewrite ^/autobattle(/.*)$ $1 break;
            proxy_pass http://autobattle-service_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /media/ {
            alias /var/www/photo-service/media/;
            try_files $uri $uri/ =404;
            autoindex off;
        }

        # Dev tools — Adminer (MySQL GUI)
        location /adminer/ {
            proxy_pass http://adminer:8080/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Static frontend (SPA)
        location / {
            root /usr/share/nginx/html;
            try_files $uri $uri/ /index.html;
        }
    }
}
