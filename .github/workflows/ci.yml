name: CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  test:
    name: Test (${{ matrix.service }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: user-service
            working-dir: services/user-service
            requirements: services/user-service/requirements.txt
            pytest-args: ''
          - service: photo-service
            working-dir: services/photo-service
            requirements: services/photo-service/requirements.txt
            pytest-args: ''
          - service: character-service
            working-dir: services/character-service/app
            requirements: services/character-service/app/requirements.txt
            pytest-args: '--asyncio-mode=auto'
          - service: skills-service
            working-dir: services/skills-service/app
            requirements: services/skills-service/app/requirements.txt
            pytest-args: '--asyncio-mode=auto'
          - service: inventory-service
            working-dir: services/inventory-service/app
            requirements: services/inventory-service/app/requirements.txt
            pytest-args: '--asyncio-mode=auto'
          - service: character-attributes-service
            working-dir: services/character-attributes-service/app
            requirements: services/character-attributes-service/app/requirements.txt
            pytest-args: '--asyncio-mode=auto'
          - service: locations-service
            working-dir: services/locations-service/app
            requirements: services/locations-service/app/requirements.txt
            pytest-args: '--asyncio-mode=auto'
          - service: notification-service
            working-dir: services/notification-service/app
            requirements: services/notification-service/app/requirements.txt
            pytest-args: ''
          - service: battle-service
            working-dir: services/battle-service/app
            requirements: services/battle-service/app/requirements.txt
            pytest-args: '--asyncio-mode=auto'
          - service: autobattle-service
            working-dir: services/autobattle-service/app
            requirements: services/autobattle-service/app/requirements.txt
            pytest-args: ''
          - service: battle-pass-service
            working-dir: services/battle-pass-service/app
            requirements: services/battle-pass-service/app/requirements.txt
            pytest-args: '--asyncio-mode=auto'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y gcc libmariadb-dev-compat libmariadb-dev pkg-config libgomp1

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'
          cache-dependency-path: ${{ matrix.requirements }}

      - name: Install Python dependencies
        run: pip install -r ${{ matrix.requirements }}

      - name: Run tests
        run: cd ${{ matrix.working-dir }} && python -m pytest tests/ ${{ matrix.pytest-args }} -v

  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Setup SSH key
        run: |
          echo "${{ secrets.SSH_PRIVATE_KEY_BASE64 }}" | base64 -d > key
          chmod 600 key

      - name: Deploy via SSH
        run: |
          ssh -o StrictHostKeyChecking=no -i key \
          ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} << 'EOF'
            set -e
            cd ~/rpgroll
            git fetch origin main
            git reset --hard origin/main
            docker compose -f docker-compose.yml -f docker-compose.prod.yml down
            docker builder prune -af
            docker compose -f docker-compose.yml -f docker-compose.prod.yml build --no-cache
            docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
            docker image prune -f
          EOF
