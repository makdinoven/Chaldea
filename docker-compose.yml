version: '3.8'

services:
  frontend:
    build:
      context: .
      dockerfile: ./docker/frontend/Dockerfile
    volumes:
      - ./services/frontend/app-chaldea:/app
    working_dir: /app
    command: sh -c "npm install --legacy-peer-deps && npm run build"

  nginx:
    build:
      context: .
      dockerfile: ./docker/nginx/Dockerfile
    ports:
      - "80:80"
    depends_on:
      - frontend
