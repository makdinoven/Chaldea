version: "3.9"
services:
  frontend:
    container_name: frontend
    build:
      context: .
      dockerfile: ./docker/frontend/Dockerfile
    working_dir: /app
    command: sh -c "npm install --legacy-peer-deps && npm run dev"
    ports:
      - "5173:5173"
    environment:
      - CHOKIDAR_USEPOLLING=true
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  mysql:
    container_name: mysql
    build:
      context: .
      dockerfile: ./docker/mysql/Dockerfile
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: mydatabase
      MYSQL_USER: myuser
      MYSQL_PASSWORD: mypassword
    ports:
      - "3306:3306"
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "${MYSQL_USER}", "--password=${MYSQL_PASSWORD}" ]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 20s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  adminer:
    container_name: adminer
    build:
      context: .
      dockerfile: ./docker/adminer/Dockerfile
    environment:
      ADMINER_DEFAULT_SERVER: mysql
    ports:
      - "8081:8080"
    depends_on:
      mysql:
        condition: service_healthy
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  rabbitmq:
    container_name: rabbitmq
    build:
      context: .
      dockerfile: ./docker/rabbitmq/Dockerfile
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: [ "CMD", "rabbitmq-diagnostics", "ping" ]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 20s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  user-service:
    container_name: user-service
    build:
      context: .
      dockerfile: ./docker/user-service/Dockerfile
    environment:
      DB_HOST: mysql
      DB_DATABASE: mydatabase
      DB_USERNAME: myuser
      DB_PASSWORD: mypassword
    ports:
      - "8000:8000"
    depends_on:
      mysql:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  photo-service:
    container_name: photo-service
    build:
      context: .
      dockerfile: ./docker/photo-service/Dockerfile
    environment:
      DB_HOST: mysql
      DB_DATABASE: mydatabase
      DB_USERNAME: myuser
      DB_PASSWORD: mypassword
      GCS_BUCKET_NAME: chaldea
      GOOGLE_APPLICATION_CREDENTIALS: /app/credentials/gcs-credentials.json
    depends_on:
      mysql:
        condition: service_healthy
    ports:
      - "8001:8001"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  character-attributes-service:
    container_name: character-attributes-service
    build:
      context: .
      dockerfile: ./docker/character-attributes-service/Dockerfile
    environment:
      DB_HOST: mysql
      DB_DATABASE: mydatabase
      DB_USERNAME: myuser
      DB_PASSWORD: mypassword
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
    depends_on:
      mysql:
        condition: service_healthy
    ports:
      - "8002:8002"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  skills-service:
    container_name: skills-service
    build:
      context: .
      dockerfile: ./docker/skills-service/Dockerfile
    environment:
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
      DB_HOST: mysql
      DB_DATABASE: mydatabase
      DB_USERNAME: myuser
      DB_PASSWORD: mypassword
    depends_on:
      mysql:
        condition: service_healthy
    ports:
      - "8003:8003"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  inventory-service:
    container_name: inventory-service
    build:
      context: .
      dockerfile: ./docker/inventory-service/Dockerfile
    environment:
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
      DB_HOST: mysql
      DB_DATABASE: mydatabase
      DB_USERNAME: myuser
      DB_PASSWORD: mypassword
    depends_on:
      mysql:
        condition: service_healthy
    ports:
      - "8004:8004"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  character-service:
    container_name: character-service
    build:
      context: .
      dockerfile: ./docker/character-service/Dockerfile
    environment:
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
      DB_HOST: mysql
      DB_DATABASE: mydatabase
      DB_USERNAME: myuser
      DB_PASSWORD: mypassword
    depends_on:
      mysql:
        condition: service_healthy
    ports:
      - "8005:8005"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  locations-service:
    container_name: locations-service
    build:
      context: .
      dockerfile: ./docker/locations-service/Dockerfile
    environment:
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
      DB_HOST: mysql
      DB_DATABASE: mydatabase
      DB_USERNAME: myuser
      DB_PASSWORD: mypassword
    depends_on:
      mysql:
        condition: service_healthy
    ports:
      - "8006:8006"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  notification-service:
    container_name: notification-service
    build:
      context: .
      dockerfile: ./docker/notification-service/Dockerfile
    environment:
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
      DB_HOST: mysql
      DB_DATABASE: mydatabase
      DB_USERNAME: myuser
      DB_PASSWORD: mypassword
    depends_on:
      rabbitmq:
        condition: service_healthy
      mysql:
        condition: service_healthy
    ports:
      - "8007:8007"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  api-gateway:
    container_name: api-gateway
    build:
      context: .
      dockerfile: ./docker/api-gateway/Dockerfile
    ports:
      - "8080:80"
    depends_on:
      - frontend
      - user-service
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
