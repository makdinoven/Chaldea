services:
  frontend:
    container_name: frontend
    build:
      context: .
      dockerfile: ./docker/frontend/Dockerfile
    working_dir: /app
    command: sh -c "npm install --legacy-peer-deps && rm -rf node_modules/.vite && npm run dev"
    ports:
      - "5555:5555"
    volumes:
      - ./services/frontend/app-chaldea:/app
      - /app/node_modules
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  mysql:
    container_name: mysql
    build:
      context: .
      dockerfile: ./docker/mysql/Dockerfile
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpassword}
      MYSQL_DATABASE: ${DB_DATABASE:-mydatabase}
      MYSQL_USER: ${DB_USERNAME:-myuser}
      MYSQL_PASSWORD: ${DB_PASSWORD:-mypassword}
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "${MYSQL_USER}", "--password=${MYSQL_PASSWORD}" ]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 20s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  adminer:
    container_name: adminer
    build:
      context: .
      dockerfile: ./docker/adminer/Dockerfile
    environment:
      ADMINER_DEFAULT_SERVER: mysql
    ports:
      - "8081:8080"
    depends_on:
      mysql:
        condition: service_healthy
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  redis:
    container_name: redis
    image: redis:7-alpine
    command: ["redis-server", "--slave-read-only", "no"]
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

  redis-insight:
      container_name: redis-insight
      image: redislabs/redisinsight:latest
      ports:
        - "5540:5540"
      environment:
        - REDIS_INSIGHT_PASSWORD=admin
      depends_on:
        - redis

  celery-worker:
    container_name: celery-worker
    build:
      context: .
      dockerfile: ./docker/battle-service/Dockerfile
    command: >
      watchfiles --filter python
      'celery -A tasks:celery_app worker --loglevel=info'
      /app
    volumes:
      - ./services/battle-service/app:/app
    depends_on:
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
      battle-service:
        condition: service_started
    environment:
      - CELERY_BROKER_URL=amqp://guest:guest@rabbitmq:5672//
      - CELERY_RESULT_BACKEND=redis://redis:6379/1
      - REDIS_URL=redis://redis:6379/0
      - MONGO_URI=mongodb://mongo:27017
      - BATTLE_SERVICE_URL=http://battle-service:8010
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  celery-beat:
      container_name: celery-beat
      build:
        context: .
        dockerfile: ./docker/battle-service/Dockerfile
      command: >
        watchfiles --filter python
        'celery -A tasks:celery_app beat --loglevel=info'
        /app
      volumes:
        - ./services/battle-service/app:/app
      depends_on:
        rabbitmq:
          condition: service_healthy
        redis:
          condition: service_healthy
      environment:
        - CELERY_BROKER_URL=amqp://guest:guest@rabbitmq:5672//
        - CELERY_RESULT_BACKEND=redis://redis:6379/1
        - REDIS_URL=redis://redis:6379/0
        - MONGO_URI=mongodb://mongo:27017
        - BATTLE_SERVICE_URL=http://battle-service:8010
      logging:
        driver: "json-file"
        options:
          max-size: "10m"
          max-file: "3"

  mongo:
      container_name: mongo
      image: mongo:6.0
      ports:
        - "27017:27017"
      volumes:
        - mongo-data:/data/db
      healthcheck:
        test: [ "CMD", "mongosh", "--eval", "db.adminCommand('ping')" ]
        interval: 5s
        timeout: 5s
        retries: 5
        start_period: 30s
      logging:
        driver: "json-file"
        options:
          max-size: "10m"
          max-file: "3"

  mongo-express:
      container_name: mongo-express
      image: mongo-express:latest
      environment:
        ME_CONFIG_MONGODB_URL: "mongodb://mongo:27017/${DB_DATABASE:-mydatabase}"
        ME_CONFIG_BASICAUTH_USERNAME: admin
        ME_CONFIG_BASICAUTH_PASSWORD: secret
      ports:
        - "8082:8081"
      depends_on:
        mongo:
          condition:
            service_healthy
      logging:
        driver: "json-file"
        options:
          max-size: "10m"
          max-file: "3"



  rabbitmq:
    container_name: rabbitmq
    build:
      context: .
      dockerfile: ./docker/rabbitmq/Dockerfile
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: [ "CMD", "rabbitmq-diagnostics", "ping" ]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 20s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  user-service:
    container_name: user-service
    build:
      context: .
      dockerfile: ./docker/user-service/Dockerfile
    command: sh -c "cd /app && (PYTHONPATH=/app alembic upgrade head || echo 'Alembic migration failed, continuing...') && uvicorn main:app --host 0.0.0.0 --port 8000 --app-dir /app --reload"
    volumes:
      - ./services/user-service:/app
    environment:
      DB_HOST: ${DB_HOST:-mysql}
      DB_DATABASE: ${DB_DATABASE:-mydatabase}
      DB_USERNAME: ${DB_USERNAME:-myuser}
      DB_PASSWORD: ${DB_PASSWORD:-mypassword}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-your-secret-key}
      CORS_ORIGINS: ${CORS_ORIGINS:-*}
    ports:
      - "8000:8000"
    depends_on:
      mysql:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  photo-service:
    container_name: photo-service
    build:
      context: .
      dockerfile: ./docker/photo-service/Dockerfile
    command: sh -c "PYTHONPATH=/app uvicorn main:app --host 0.0.0.0 --port 8001 --app-dir /app --reload"
    volumes:
      - ./services/photo-service:/app
    env_file:
      - .env
    environment:
      DB_HOST: ${DB_HOST:-mysql}
      DB_DATABASE: ${DB_DATABASE:-mydatabase}
      DB_USERNAME: ${DB_USERNAME:-myuser}
      DB_PASSWORD: ${DB_PASSWORD:-mypassword}
      CORS_ORIGINS: ${CORS_ORIGINS:-*}
    depends_on:
      mysql:
        condition: service_healthy
    ports:
      - "8001:8001"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  character-attributes-service:
    container_name: character-attributes-service
    build:
      context: .
      dockerfile: ./docker/character-attributes-service/Dockerfile
    command: sh -c "PYTHONPATH=/app uvicorn main:app --host 0.0.0.0 --port 8002 --app-dir /app --reload"
    volumes:
      - ./services/character-attributes-service/app:/app
    environment:
      DB_HOST: ${DB_HOST:-mysql}
      DB_DATABASE: ${DB_DATABASE:-mydatabase}
      DB_USERNAME: ${DB_USERNAME:-myuser}
      DB_PASSWORD: ${DB_PASSWORD:-mypassword}
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
      CORS_ORIGINS: ${CORS_ORIGINS:-*}
    depends_on:
      mysql:
        condition: service_healthy
    ports:
      - "8002:8002"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  skills-service:
    container_name: skills-service
    build:
      context: .
      dockerfile: ./docker/skills-service/Dockerfile
    command: sh -c "PYTHONPATH=/app uvicorn main:app --host 0.0.0.0 --port 8003 --app-dir /app --reload"
    volumes:
      - ./services/skills-service/app:/app
    environment:
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
      DB_HOST: ${DB_HOST:-mysql}
      DB_DATABASE: ${DB_DATABASE:-mydatabase}
      DB_USERNAME: ${DB_USERNAME:-myuser}
      DB_PASSWORD: ${DB_PASSWORD:-mypassword}
      CORS_ORIGINS: ${CORS_ORIGINS:-*}
    depends_on:
      mysql:
        condition: service_healthy
    ports:
      - "8003:8003"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  inventory-service:
    container_name: inventory-service
    build:
      context: .
      dockerfile: ./docker/inventory-service/Dockerfile
    command: sh -c "PYTHONPATH=/app uvicorn main:app --host 0.0.0.0 --port 8004 --app-dir /app --reload"
    volumes:
      - ./services/inventory-service/app:/app
    environment:
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
      DB_HOST: ${DB_HOST:-mysql}
      DB_DATABASE: ${DB_DATABASE:-mydatabase}
      DB_USERNAME: ${DB_USERNAME:-myuser}
      DB_PASSWORD: ${DB_PASSWORD:-mypassword}
      CORS_ORIGINS: ${CORS_ORIGINS:-*}
    depends_on:
      mysql:
        condition: service_healthy
    ports:
      - "8004:8004"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  character-service:
    container_name: character-service
    build:
      context: .
      dockerfile: ./docker/character-service/Dockerfile
    command: sh -c "PYTHONPATH=/app uvicorn main:app --host 0.0.0.0 --port 8005 --app-dir /app --reload"
    volumes:
      - ./services/character-service/app:/app
    environment:
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
      DB_HOST: ${DB_HOST:-mysql}
      DB_DATABASE: ${DB_DATABASE:-mydatabase}
      DB_USERNAME: ${DB_USERNAME:-myuser}
      DB_PASSWORD: ${DB_PASSWORD:-mypassword}
      CORS_ORIGINS: ${CORS_ORIGINS:-*}
    depends_on:
      mysql:
        condition: service_healthy
    ports:
      - "8005:8005"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  locations-service:
    container_name: locations-service
    build:
      context: .
      dockerfile: ./docker/locations-service/Dockerfile
    command: sh -c "PYTHONPATH=/app uvicorn main:app --host 0.0.0.0 --port 8006 --app-dir /app --reload"
    volumes:
      - ./services/locations-service/app:/app
    environment:
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
      DB_HOST: ${DB_HOST:-mysql}
      DB_DATABASE: ${DB_DATABASE:-mydatabase}
      DB_USERNAME: ${DB_USERNAME:-myuser}
      DB_PASSWORD: ${DB_PASSWORD:-mypassword}
      CORS_ORIGINS: ${CORS_ORIGINS:-*}
    depends_on:
      mysql:
        condition: service_healthy
    ports:
      - "8006:8006"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  notification-service:
    container_name: notification-service
    build:
      context: .
      dockerfile: ./docker/notification-service/Dockerfile
    command: sh -c "PYTHONPATH=/app uvicorn main:app --host 0.0.0.0 --port 8007 --app-dir /app --reload"
    volumes:
      - ./services/notification-service/app:/app
    environment:
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
      DB_HOST: ${DB_HOST:-mysql}
      DB_DATABASE: ${DB_DATABASE:-mydatabase}
      DB_USERNAME: ${DB_USERNAME:-myuser}
      DB_PASSWORD: ${DB_PASSWORD:-mypassword}
    depends_on:
      rabbitmq:
        condition: service_healthy
      mysql:
        condition: service_healthy
    ports:
      - "8007:8007"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  battle-service:
    container_name: battle-service
    build:
      context: .
      dockerfile: ./docker/battle-service/Dockerfile
    command: sh -c "PYTHONPATH=/app uvicorn main:app --host 0.0.0.0 --port 8010 --app-dir /app --reload"
    volumes:
      - ./services/battle-service/app:/app
    environment:
      DB_HOST: ${DB_HOST:-mysql}
      DB_DATABASE: ${DB_DATABASE:-mydatabase}
      DB_USERNAME: ${DB_USERNAME:-myuser}
      DB_PASSWORD: ${DB_PASSWORD:-mypassword}
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
      REDIS_URL: redis://redis:6379/0
      MONGODB_URL: mongodb://mongo:27017/${DB_DATABASE:-mydatabase}
    depends_on:
      - mysql
      - rabbitmq
      - redis
      - mongo
    ports:
      - "8010:8010"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  autobattle-service:
    container_name: autobattle-service
    build:
      context: .
      dockerfile: ./docker/autobattle-service/Dockerfile
    command: sh -c "PYTHONPATH=/app uvicorn main:app --host 0.0.0.0 --port 8011 --app-dir /app --reload"
    volumes:
      - ./services/autobattle-service/app:/app
    environment:
      BATTLE_SERVICE_URL: http://battle-service:8010
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
      REDIS_URL: redis://redis:6379/0
      MONGODB_URL: mongodb://mongo:27017/${DB_DATABASE:-mydatabase}
    depends_on:
      - battle-service
      - rabbitmq
      - redis
      - mongo
    ports:
      - "8011:8011"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  api-gateway:
    container_name: api-gateway
    build:
      context: .
      dockerfile: ./docker/api-gateway/Dockerfile
    ports:
      - "80:80"
    depends_on:
      - frontend
      - user-service
      - battle-service
      - autobattle-service
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"


volumes:
  mysql-data:
  redis-data:
  mongo-data:
