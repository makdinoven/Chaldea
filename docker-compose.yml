version: '3.8'

services:
  #  frontend:
  #    build:
  #      context: .
  #      dockerfile: ./docker/frontend/Dockerfile
  #    volumes:
  #      - ./services/frontend/app-chaldea:/app
  #      - /app/node_modules
  #      - /app/dist
  #    working_dir: /app
  #    command: sh -c "npm install --legacy-peer-deps && npm run build --watch"

  frontend:
    build:
      context: .
      dockerfile: ./docker/frontend/Dockerfile
    volumes:
      - ./services/frontend/app-chaldea:/app
      - /app/node_modules
    working_dir: /app
    command: sh -c "npm install --legacy-peer-deps && npm run dev"
    ports:
      - "5173:5173"
    environment:
      - CHOKIDAR_USEPOLLING=true


  mysql:
    build:
      context: .
      dockerfile: ./docker/mysql/Dockerfile
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/mysql/backups:/backups
    ports:
      - '3306:3306'

  mysql_test:
    build:
      context: .
      dockerfile: ./docker/mysql_test/Dockerfile
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_TEST_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_TEST_DATABASE}
      MYSQL_USER: ${MYSQL_TEST_USER}
      MYSQL_PASSWORD: ${MYSQL_TEST_PASSWORD}
    volumes:
      - mysql_test_data:/var/lib/mysql_test
    ports:
      - '3307:3306'

  #  phpmyadmin:
  #        build:
  #          context: .
  #          dockerfile: ./docker/phpmyadmin/Dockerfile
  #        environment:
  #          PMA_HOST: mysql
  #          PMA_PORT: 3306
  #          PMA_USER: myuser
  #          PMA_PASSWORD: mypassword
  #        ports:
  #          - "8081:80"
  #        depends_on:
  #          - mysql

  adminer:
    build:
      context: .
      dockerfile: ./docker/adminer/Dockerfile
    environment:
      ADMINER_DEFAULT_SERVER: mysql
    ports:
      - "8081:8080"
    depends_on:
      - mysql
  adminer_test:
    build:
      context: .
      dockerfile: ./docker/adminer_test/Dockerfile
    environment:
      ADMINER_DEFAULT_SERVER: mysql_test
    ports:
      - "8082:8080"
    depends_on:
      - mysql_test


  user-service:
    build:
      context: .
      dockerfile: ./docker/user-service/Dockerfile
    environment:
      DB_HOST: mysql
      DB_DATABASE: mydatabase
      DB_USERNAME: myuser
      DB_PASSWORD: mypassword
    ports:
      - "8000:8000"
    volumes:
      - ./services/user-service:/var/www
    depends_on:
      - mysql

  #  rabbitmq:
  #    build:
  #      context: .
  #      dockerfile: ./docker/rabbitmq/Dockerfile
  #    environment:
  #      RABBITMQ_DEFAULT_USER: guest
  #      RABBITMQ_DEFAULT_PASS: guest
  #    ports:
  #      - '5672:5672'
  #      - '15672:15672'

  photo-service:
    build:
      context: .
      dockerfile: ./docker/photo-service/Dockerfile
    environment:
      DB_HOST: mysql
      DB_DATABASE: mydatabase
      DB_USERNAME: myuser
      DB_PASSWORD: mypassword
      GCS_BUCKET_NAME: chaldea  # Замените на название вашего бакета
      GOOGLE_APPLICATION_CREDENTIALS: /app/credentials/gcs-credentials.json  # Путь к файлу ключа
    volumes:
      - ./services/photo-service:/app
      - ./services/photo-service/credentials/gcs-credentials.json:/app/credentials/gcs-credentials.json:ro
    depends_on:
      - mysql
    ports:
      - "8001:8001"

  character-attributes-service:
    build:
      context: .
      dockerfile: ./docker/character-attributes-service/Dockerfile
    environment:
      DB_HOST: mysql
      DB_DATABASE: mydatabase
      DB_USERNAME: myuser
      DB_PASSWORD: mypassword
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
    depends_on:
      - mysql
    ports:
      - "8002:8002"

  skills-service:
    build:
      context: .
      dockerfile: ./docker/skills-service/Dockerfile
    environment:
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
      DB_HOST: mysql
      DB_DATABASE: mydatabase
      DB_USERNAME: myuser
      DB_PASSWORD: mypassword
    depends_on:
      - mysql
    ports:
      - "8003:8003"

  inventory-service:
    build:
      context: .
      dockerfile: ./docker/inventory-service/Dockerfile
    environment:
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
      DB_HOST: mysql
      DB_DATABASE: mydatabase
      DB_USERNAME: myuser
      DB_PASSWORD: mypassword
    depends_on:
      - mysql
    ports:
      - "8004:8004"

  character-service:
    build:
      context: .
      dockerfile: ./docker/character-service/Dockerfile
    environment:
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
      DB_HOST: mysql
      DB_DATABASE: mydatabase
      DB_USERNAME: myuser
      DB_PASSWORD: mypassword
    depends_on:
      - mysql
    ports:
      - "8005:8005"

  locations-service:
    build:
      context: .
      dockerfile: ./docker/locations-service/Dockerfile
    environment:
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
      DB_HOST: mysql
      DB_DATABASE: mydatabase
      DB_USERNAME: myuser
      DB_PASSWORD: mypassword
    depends_on:
      - mysql
    ports:
      - "8006:8006"


  api-gateway:
    build:
      context: .
      dockerfile: ./docker/api-gateway/Dockerfile
    volumes:
      - ./services/frontend/app-chaldea/dist:/usr/share/nginx/html
      - ./docker/nginx/nginx.conf:/etc/nginx/conf.d/default.conf
      - /var/run/docker.sock:/var/run/docker.sock
    ports:
      - "80:80"
    depends_on:
      - frontend

  test-service:
    build:
      context: .
      dockerfile: ./docker/test-service/Dockerfile
    environment:
      - DATABASE_URL=mysql+pymysql://myuser:mypassword@mysql_test:3307/mydatabase_test

    ports:
      - "8090:8090"
    depends_on:
      - mysql_test




volumes:
  mysql_data:
  mysql_test_data:
  tests:


