version: '3.8'

services:
  frontend:
    build:
      context: .
      dockerfile: ./docker/frontend/Dockerfile
    volumes:
      - ./services/frontend/app-chaldea:/app
      - /app/node_modules
      - /app/dist
    working_dir: /app
    command: sh -c "npm install --legacy-peer-deps && npm run build --watch"


  api-gateway:
    build:
      context: .
      dockerfile: ./docker/api-gateway/Dockerfile
    volumes:
      - ./services/frontend/app-chaldea/dist:/usr/share/nginx/html # Добавлено для монтирования собранных статических файлов
      - ./docker/api-gateway/nginx.conf:/etc/nginx/conf.d/default.conf # Для монтирования конфигурационного файла nginx
    ports:
      - "80:80"
    depends_on:
      - frontend

  mysql:
    build:
      context: .
      dockerfile: ./docker/mysql/Dockerfile
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: mydatabase
      MYSQL_USER: myuser
      MYSQL_PASSWORD: mypassword
    volumes:
      - mysql_data:/var/lib/mysql
    ports:
      - "3306:3306"


#  phpmyadmin:
#      build:
#        context: .
#        dockerfile: ./docker/phpmyadmin/Dockerfile
#      environment:
#        PMA_HOST: mysql
#        PMA_PORT: 3306
