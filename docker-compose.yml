#        PMA_PASSWORD: ${MYSQL_PASSWORD}
#      ports:
#        - "8081:80"
#      depends_on:
#        - mysql


  adminer:
    build:
      context: .
      dockerfile: ./docker/adminer/Dockerfile
    environment:
      ADMINER_DEFAULT_SERVER: mysql
    ports:
      - "8081:8080"
    depends_on:
      - mysql

  user-service:
    build:
      context: .
      dockerfile: ./docker/user-service/Dockerfile
    volumes:
        - ./services/user-service:/app
    depends_on:
        - mysql
        - api-gateway
    networks:
        - default
    ports:
       - "8000:8000"

